<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>Super Pong: Mobile Overdrive</title>
    <style>
        html, body {
            background-color: #050505;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            position: fixed; /* Prevents Chrome pull-to-refresh pull downs */
            touch-action: none; 
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .game-wrapper {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        canvas {
            background-color: #050505;
            display: block;
            box-sizing: border-box;
            /* Border removed to ensure clean edge-to-edge tracking */
        }
        #mobileSuperBtn {
            display: none; 
            position: absolute;
            bottom: 25px;
            right: 25px;
            width: 75px;
            height: 75px;
            background-color: #00ffcc;
            border: none;
            border-radius: 50%;
            color: #111;
            font-weight: bold;
            font-size: 13px;
            box-shadow: 0 0 20px #00ffcc;
            text-transform: uppercase;
            z-index: 10;
        }
        #mobilePauseBtn {
            position: absolute;
            top: 15px;
            right: 15px;
            width: 44px;
            height: 44px;
            background-color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 8px;
            color: white;
            font-size: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 10;
        }
    </style>
</head>
<body>

    <div class="game-wrapper">
        <canvas id="pongCanvas"></canvas>
        <button id="mobilePauseBtn">⏸</button>
        <button id="mobileSuperBtn">SUPER</button>
    </div>

    <script>
        const canvas = document.getElementById("pongCanvas");
        const ctx = canvas.getContext("2d");
        const mobileSuperBtn = document.getElementById("mobileSuperBtn");
        const mobilePauseBtn = document.getElementById("mobilePauseBtn");

        // --- GAME TUNING CONSTANTS ---
        const PADDLE_WIDTH = 12;
        const PADDLE_HEIGHT = 85;
        const BALL_SIZE = 14;
        
        const PLAYER_SPEED = 9;    
        const AI_SPEED = 4.3;      
        const SPIN_DECAY = 0.97;   
        const WINNING_SCORE = 20; 

        // --- GAME STATE SYSTEM ---
        let gameState = "MENU"; 

        // --- GAME STATE VARIABLES ---
        let playerY, aiY;
        let playerScore = 0;
        let aiScore = 0;

        let ballX, ballY, ballSpeedX, ballSpeedY;

        let isPaused = false;
        let ballSpin = 0; 
        let ballHistory = []; 

        let playerCharge = 0;
        let aiCharge = 0;
        let activeSuper = null; 
        let aiErrorY = 0; 

        let superRallyActive = false; 
        let rallyHitsCount = 0;       
        let dynamicMultiplier = 1.0;  

        let mobileSuperPressed = false;
        let touchTargetY = null;

        // Button Positions (Calculated dynamically on resize)
        let startBtn = {}, restartBtn = {}, pauseRestartBtn = {};

        // --- THE DYNAMIC FULLSCREEN RESIZER ---
        function resizeCanvas() {
            // Get exact window dimensions
            const w = window.innerWidth;
            const h = window.innerHeight;
            
            // Set canvas internal dimensions to perfectly match screen
            canvas.width = w;
            canvas.height = h;

            // Recalculate UI button coordinates based on new screen centers
            startBtn = { x: canvas.width / 2 - 100, y: canvas.height / 2 + 20, w: 200, h: 50 };
            restartBtn = { x: canvas.width / 2 - 100, y: canvas.height / 2 + 40, w: 200, h: 50 };
            pauseRestartBtn = { x: canvas.width / 2 - 100, y: canvas.height / 2 + 40, w: 200, h: 40 };

            // Secure paddles from escaping off screen during rotate triggers
            if (playerY === undefined) {
                playerY = canvas.height / 2 - PADDLE_HEIGHT / 2;
                aiY = canvas.height / 2 - PADDLE_HEIGHT / 2;
                ballX = canvas.width / 2;
                ballY = canvas.height / 2;
            }
        }
        
        // Listen for screen flips or window adjustments
        window.addEventListener('resize', resizeCanvas);
        window.addEventListener('orientationchange', resizeCanvas);
        resizeCanvas(); // Initialize dimensions right away

        // --- INPUT TRACKERS ---
        const keys = {};
        window.addEventListener("keydown", (e) => {
            if(e.key === " ") e.preventDefault(); 
            if(gameState === "PLAYING" && e.key.toLowerCase() === "p") { togglePause(); return; }
            keys[e.key.toLowerCase()] = true;
        });
        window.addEventListener("keyup", (e) => keys[e.key.toLowerCase()] = false);

        function togglePause() {
            if (gameState !== "PLAYING") return;
            isPaused = !isPaused;
            mobilePauseBtn.textContent = isPaused ? "▶" : "⏸";
        }

        mobilePauseBtn.addEventListener("touchstart", (e) => { e.preventDefault(); togglePause(); });

        window.addEventListener("touchstart", (e) => {
            const rect = canvas.getBoundingClientRect();
            const touch = e.touches[0];
            const mouseX = touch.clientX - rect.left;
            const mouseY = touch.clientY - rect.top;

            if (gameState === "MENU") {
                if (mouseX >= startBtn.x && mouseX <= startBtn.x + startBtn.w && mouseY >= startBtn.y && mouseY <= startBtn.y + startBtn.h) startGame();
            } else if (gameState === "GAMEOVER") {
                if (mouseX >= restartBtn.x && mouseX <= restartBtn.x + restartBtn.w && mouseY >= restartBtn.y && mouseY <= restartBtn.y + restartBtn.h) { resetMatch(); startGame(); }
            } else if (gameState === "PLAYING" && isPaused) {
                if (mouseX >= pauseRestartBtn.x && mouseX <= pauseRestartBtn.x + pauseRestartBtn.w && mouseY >= pauseRestartBtn.y && mouseY <= pauseRestartBtn.y + pauseRestartBtn.h) { resetMatch(); startGame(); }
            } else if (gameState === "PLAYING" && !isPaused && mouseX < canvas.width / 2) {
                touchTargetY = mouseY;
            }
        }, {passive: true});

        window.addEventListener("touchmove", (e) => {
            if (gameState === "PLAYING" && !isPaused) {
                const rect = canvas.getBoundingClientRect();
                const touch = e.touches[0];
                const mouseX = touch.clientX - rect.left;
                const mouseY = touch.clientY - rect.top;
                if (mouseX < canvas.width / 2) touchTargetY = mouseY;
            }
        }, {passive: true});

        window.addEventListener("touchend", () => { touchTargetY = null; });
        mobileSuperBtn.addEventListener("touchstart", (e) => { e.preventDefault(); mobileSuperPressed = true; });
        mobileSuperBtn.addEventListener("touchend", () => { mobileSuperPressed = false; });

        function startGame() { gameState = "PLAYING"; isPaused = false; mobilePauseBtn.textContent = "⏸"; mobilePauseBtn.style.display = "flex"; }
        function resetMatch() { playerScore = 0; aiScore = 0; playerCharge = 0; aiCharge = 0; resetBall("player"); }

        function resetBall(winner) {
            ballX = canvas.width / 2;
            ballY = (canvas.height - 20) / 2;
            ballSpeedX = winner === "player" ? 6 : -6;
            ballSpeedY = (Math.random() * 2 - 1) * 3;
            activeSuper = null;
            ballSpin = 0; 
            ballHistory = [];
            aiErrorY = 0; 
            superRallyActive = false;
            rallyHitsCount = 0;
            dynamicMultiplier = 1.0;
        }

        // Initialize values post-resize config
        resetBall("player");

        // --- ENGINE UPDATE LOOP ---
        function update() {
            if (gameState !== "PLAYING") mobilePauseBtn.style.display = "none";
            if (gameState !== "PLAYING" || isPaused) return;

            // 1. Player Movement Logic
            let playerMoving = 0;
            if (keys['w']) { playerY -= PLAYER_SPEED; playerMoving = -1; }
            else if (keys['s']) { playerY += PLAYER_SPEED; playerMoving = 1; }
            else if (touchTargetY !== null) {
                let paddleCenterY = playerY + PADDLE_HEIGHT / 2;
                if (touchTargetY < paddleCenterY - 12) { playerY -= PLAYER_SPEED; playerMoving = -1; }
                else if (touchTargetY > paddleCenterY + 12) { playerY += PLAYER_SPEED; playerMoving = 1; }
            }
            if (playerY < 0) playerY = 0;
            if (playerY > canvas.height - 20 - PADDLE_HEIGHT) playerY = canvas.height - 20 - PADDLE_HEIGHT;

            if (playerCharge >= 100) { mobileSuperBtn.style.display = "block"; } else { mobileSuperBtn.style.display = "none"; }

            // 2. Humanized AI Movement
            let currentAiSpeed = AI_SPEED + (dynamicMultiplier * 1.5); 
            if (Math.random() < 0.03) { aiErrorY = (Math.random() * 2 - 1) * 45; }
            let aiTarget = (ballY - PADDLE_HEIGHT / 2) + aiErrorY;
            let aiMoving = 0;
            if (ballSpeedX > 0) { 
                if (aiY < aiTarget && aiY < canvas.height - 20 - PADDLE_HEIGHT) { aiY += currentAiSpeed; aiMoving = 1; }
                if (aiY > aiTarget && aiY > 0) { aiY -= currentAiSpeed; aiMoving = -1; }
            }
            if (aiY < 0) aiY = 0;
            if (aiY > canvas.height - 20 - PADDLE_HEIGHT) aiY = canvas.height - 20 - PADDLE_HEIGHT;

            // 3. Curve Physics & Dynamic Momentum Matrix
            ballSpeedY += ballSpin; 
            ballSpin *= SPIN_DECAY; 

            let maxVerticalSpeed = superRallyActive ? (5 * dynamicMultiplier) : 3.5; 
            if (ballSpeedY > maxVerticalSpeed) ballSpeedY = maxVerticalSpeed;
            if (ballSpeedY < -maxVerticalSpeed) ballSpeedY = -maxVerticalSpeed;

            let currentVectorSpeed = Math.sqrt(ballSpeedX * ballSpeedX + ballSpeedY * ballSpeedY);
            let baseSpeed = superRallyActive ? 14 : 7.5; 
            let curveBonus = Math.min(Math.abs(ballSpin) * 10, 4.5); 
            
            let targetSpeed = (baseSpeed + curveBonus) * dynamicMultiplier; 

            ballSpeedX = (ballSpeedX / currentVectorSpeed) * targetSpeed;
            ballSpeedY = (ballSpeedY / currentVectorSpeed) * targetSpeed;

            let minHorizontalSpeed = superRallyActive ? (10 * dynamicMultiplier) : 6.0;
            if (Math.abs(ballSpeedX) < minHorizontalSpeed) {
                ballSpeedX = Math.sign(ballSpeedX) * minHorizontalSpeed;
            }

            ballX += ballSpeedX;
            ballY += ballSpeedY;

            let dynamicTrailMax = 8 + Math.floor(dynamicMultiplier * 6);
            ballHistory.push({x: ballX, y: ballY});
            while (ballHistory.length > dynamicTrailMax) ballHistory.shift();

            // Wall Collisions
            if (ballY <= 0) { ballY = 0; ballSpeedY = -ballSpeedY; ballSpin = -ballSpin; }
            if (ballY >= canvas.height - 20 - BALL_SIZE) { ballY = canvas.height - 20 - BALL_SIZE; ballSpeedY = -ballSpeedY; ballSpin = -ballSpin; }

            // 4. Paddle Collision Detection
            // Player Paddle (Left)
            if (ballX <= PADDLE_WIDTH + 15) {
                if (ballY + BALL_SIZE >= playerY && ballY <= playerY + PADDLE_HEIGHT) {
                    if (ballSpeedX < 0) { 
                        ballSpin = playerMoving * 0.18; 
                        let superTriggered = mobileSuperPressed && playerCharge >= 100;

                        if (superTriggered) {
                            playerCharge = 0;
                            if (superRallyActive) { dynamicMultiplier = 2.0; activeSuper = "player"; } 
                            else { superRallyActive = true; dynamicMultiplier = 1.0; activeSuper = "player"; }
                        } else {
                            if (superRallyActive) {
                                rallyHitsCount++;
                                dynamicMultiplier = 1.1 + (rallyHitsCount * 0.1); 
                            } else {
                                activeSuper = null; dynamicMultiplier = 1.0;
                                if (playerCharge < 100) playerCharge += 25; 
                            }
                        }
                        ballSpeedX = -ballSpeedX;
                    }
                }
            }

            // AI Paddle (Right)
            if (ballX >= canvas.width - PADDLE_WIDTH - 15 - BALL_SIZE) {
                if (ballY + BALL_SIZE >= aiY && ballY <= aiY + PADDLE_HEIGHT) {
                    if (ballSpeedX > 0) { 
                        ballSpin = aiMoving * 0.18; 
                        let superTriggered = aiCharge >= 100;

                        if (superTriggered) {
                            aiCharge = 0;
                            if (superRallyActive) { dynamicMultiplier = 2.0; activeSuper = "ai"; } 
                            else { superRallyActive = true; dynamicMultiplier = 1.0; activeSuper = "ai"; }
                        } else {
                            if (superRallyActive) {
                                rallyHitsCount++;
                                dynamicMultiplier = 1.1 + (rallyHitsCount * 0.1); 
                            } else {
                                activeSuper = null; dynamicMultiplier = 1.0;
                                if (aiCharge < 100) aiCharge += 25;
                            }
                        }
                        ballSpeedX = -ballSpeedX;
                    }
                }
            }

            // 5. Scoring & Match Win Condition
            if (ballX < 0) {
                aiScore++;
                if (aiScore >= WINNING_SCORE) { gameState = "GAMEOVER"; } else { resetBall("ai"); }
            } else if (ballX > canvas.width) {
                playerScore++;
                if (playerScore >= WINNING_SCORE) { gameState = "GAMEOVER"; } else { resetBall("player"); }
            }
        }

        // --- RENDER VISUALS LOOP ---
        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);

            if (gameState === "MENU") {
                ctx.textAlign = "center"; ctx.font = "bold 32px Arial"; ctx.fillStyle = "#00ffcc";
                ctx.fillText("SUPER PONG: OVERDRIVE", canvas.width / 2, canvas.height / 2 - 40);
                ctx.font = "14px Arial"; ctx.fillStyle = "#888";
                ctx.fillText("Rotate phone sideways & tap button to start", canvas.width / 2, canvas.height / 2 - 10);

                ctx.fillStyle = "#1a1a1a"; ctx.strokeStyle = "#00ffcc"; ctx.lineWidth = 2;
                ctx.fillRect(startBtn.x, startBtn.y, startBtn.w, startBtn.h); ctx.strokeRect(startBtn.x, startBtn.y, startBtn.w, startBtn.h);
                ctx.font = "bold 16px Arial"; ctx.fillStyle = "#00ffcc"; ctx.fillText("START GAME", canvas.width / 2, canvas.height / 2 + 50);
                ctx.textAlign = "start"; 

            } else if (gameState === "GAMEOVER") {
                ctx.textAlign = "center"; ctx.font = "bold 42px Arial";
                ctx.fillStyle = playerScore >= WINNING_SCORE ? "#00ffcc" : "#ff00ff";
                ctx.fillText(playerScore >= WINNING_SCORE ? "YOU WIN!" : "AI WINS!", canvas.width / 2, canvas.height / 2 - 40);
                ctx.font = "20px Arial"; ctx.fillStyle = "#fff";
                ctx.fillText(`Final Score: ${playerScore} - ${aiScore}`, canvas.width / 2, canvas.height / 2);

                ctx.fillStyle = "#1a1a1a"; ctx.strokeStyle = "#ffffff"; ctx.lineWidth = 2;
                ctx.fillRect(restartBtn.x, restartBtn.y, restartBtn.w, restartBtn.h); ctx.strokeRect(restartBtn.x, restartBtn.y, restartBtn.w, restartBtn.h);
                ctx.font = "bold 16px Arial"; ctx.fillStyle = "#ffffff"; ctx.fillText("PLAY AGAIN", canvas.width / 2, canvas.height / 2 + 70);
                ctx.textAlign = "start";

            } else if (gameState === "PLAYING") {
                ctx.setLineDash([10, 10]); ctx.strokeStyle = "rgba(255, 255, 255, 0.15)";
                ctx.beginPath(); ctx.moveTo(canvas.width / 2, 0); ctx.lineTo(canvas.width / 2, canvas.height - 20); ctx.stroke();
                ctx.setLineDash([]);

                ctx.font = "32px Arial"; ctx.fillStyle = "white";
                ctx.fillText(playerScore, canvas.width / 4, 50); ctx.fillText(aiScore, (canvas.width / 4) * 3, 50);

                // Paddles
                ctx.fillStyle = "white";
                ctx.fillRect(15, playerY, PADDLE_WIDTH, PADDLE_HEIGHT);
                ctx.fillRect(canvas.width - PADDLE_WIDTH - 15, aiY, PADDLE_WIDTH, PADDLE_HEIGHT);

                for (let i = 0; i < ballHistory.length; i++) {
                    let opacity = (i + 1) / ballHistory.length * 0.35;
                    ctx.fillStyle = activeSuper === "player" ? `rgba(0, 255, 204, ${opacity})` : activeSuper === "ai" ? `rgba(255, 0, 255, ${opacity})` : `rgba(255, 255, 255, ${opacity})`;
                    ctx.fillRect(ballHistory[i].x, ballHistory[i].y, BALL_SIZE, BALL_SIZE);
                }

                if (activeSuper === "player") { ctx.fillStyle = "#00ffcc"; ctx.shadowBlur = 25; ctx.shadowColor = "#00ffcc"; }
                else if (activeSuper === "ai") { ctx.fillStyle = "#ff00ff"; ctx.shadowBlur = 25; ctx.shadowColor = "#ff00ff"; }
                else { ctx.fillStyle = "white"; ctx.shadowBlur = 0; }
                ctx.fillRect(ballX, ballY, BALL_SIZE, BALL_SIZE);
                ctx.shadowBlur = 0; 

                // HUD Gauges
                const meterY = canvas.height - 12;
                ctx.fillStyle = "#222"; ctx.fillRect(15, meterY, 150, 8);
                ctx.fillStyle = playerCharge >= 100 ? "#00ffcc" : "#ffcc00"; ctx.fillRect(15, meterY, (playerCharge / 100) * 150, 8);

                ctx.fillStyle = "#222"; ctx.fillRect(canvas.width - 165, meterY, 150, 8);
                ctx.fillStyle = aiCharge >= 100 ? "#ff00ff" : "#ffcc00"; ctx.fillRect(canvas.width - 165, meterY, (aiCharge / 100) * 150, 8);

                if (superRallyActive) {
                    ctx.font = "bold 13px Arial";
                    ctx.fillStyle = dynamicMultiplier === 2.0 ? "#ff0055" : "#ffcc00";
                    ctx.textAlign = "center";
                    let displayText = dynamicMultiplier === 2.0 ? "MAX OVERDRIVE CRITICAL: 2.0x SPEED!" : `MOMENTUM RALLY: ${dynamicMultiplier.toFixed(1)}x SPEED`;
                    ctx.fillText(displayText, canvas.width / 2, 30);
                    ctx.textAlign = "start";
                }

                if (isPaused) {
                    ctx.fillStyle = "rgba(0, 0, 0, 0.75)"; ctx.fillRect(0, 0, canvas.width, canvas.height - 20);
                    ctx.textAlign = "center"; ctx.font = "bold 40px Arial"; ctx.fillStyle = "#ffcc00";
                    ctx.fillText("PAUSED", canvas.width / 2, canvas.height / 2 - 30);
                    ctx.fillStyle = "#222"; ctx.strokeStyle = "#ff3366"; ctx.fillRect(pauseRestartBtn.x, pauseRestartBtn.y, pauseRestartBtn.w, pauseRestartBtn.h); ctx.strokeRect(pauseRestartBtn.x, pauseRestartBtn.y, pauseRestartBtn.w, pauseRestartBtn.h);
                    ctx.font = "bold 14px Arial"; ctx.fillStyle = "#ff3366"; ctx.fillText("RE-START THE GAME", canvas.width / 2, canvas.height / 2 + 65);
                    ctx.textAlign = "start"; 
                }
            }
        }

        function gameLoop() { update(); draw(); requestAnimationFrame(gameLoop); }
        gameLoop();
    </script>
</body>
</html>
